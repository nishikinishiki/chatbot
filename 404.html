<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found｜マンション投資のJPリターンズ株式会社</title>
    <style>
        /* 最小限のリセットとベース設定 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f9fafb;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        /* ヘッダーとフッター */
        header {
            background: #fff;
            border-bottom: 4px solid #4eb6aa;
            padding: 1rem;
            font-size: 1.5rem;
            font-weight: bold;
        }

        footer {
            padding: 1rem;
            font-size: 0.8rem;
            color: #999;
        }

        /* メインコンテンツ（中央揃え） */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* エラーメッセージ用のカード */
        .card {
            background: #fff;
            padding: 3rem 2rem;
            border-radius: 1rem;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 5rem;
            color: #f3f4f6;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        p {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* ボタン共通・個別スタイル */
        .btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 99px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border: 2px solid #4eb6aa;
        }

        .btn-main {
            background: #4eb6aa;
            color: #fff;
        }

        .btn-sub {
            background: #fff;
            color: #4eb6aa;
        }
    </style>
</head>

<body>
    <header>J.P.RETURNS</header>

    <main>
        <div class="card">
            <h1>404</h1>
            <h2>Page Not Found</h2>
            <p>お探しのページが見つかりません。<br>URLが変更されたか、削除された可能性があります。<br>お手数ですが、URLをご確認いただくかトップページからお探しください。</p>

            <a href="https://jpreturns.com/" class="btn btn-main">トップページへ戻る</a>
            <button type="button" onclick="history.back()" class="btn btn-sub">前のページに戻る</button>
        </div>
    </main>

    <footer>&copy; J.P.RETURNS All Rights Reserved.</footer>

</body>

</html>
